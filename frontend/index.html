<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>lyrics.ovh: Only the lyrics</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.usefathom.com/script.js"
      data-site="EIJSUNWO"
      defer
    ></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1><a href="/">lyrics.ovh</a></h1>
        <p class="tagline">Only the lyrics</p>
      </header>

      <div class="search">
        <input
          type="text"
          autofocus
          placeholder="Search for a song..."
          id="search-input"
          autocomplete="off"
        />
        <ul class="results" id="results"></ul>
      </div>

      <div class="lyrics" id="lyrics"></div>
    </div>

    <footer>
      <a href="https://github.com/NTag/lyrics.ovh">GitHub</a>
      <a href="https://github.com/NTag">Made by NTag</a>
    </footer>

    <script src="search.js"></script>
  </body>
</html>
